name: Deploy to Afrihost via FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated to v4

      - name: Install Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '20' # Vite works best with Node 20+

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy via FTP
        # CRITICAL FIX: Changed SamKirkland to samkirkland
        uses: samkirkland/FTP-Deploy-Action@v4.3.5 
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Since your FTP account is pointing to /home/camluxlh/public_html,
          # use ./ so it drops the files exactly there.
          server-dir: ./
